name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

# Serialize formula updates. Two dispatches arriving close together (e.g. a
# stable release and its beta partner from the same source repo) both check
# out the same commit, both write to different formula files, both try to
# push. First wins; second's push is rejected because the remote moved.
#
# cancel-in-progress is FALSE because we want each update to land — they
# target different formula files and aren't superseded by later dispatches.
# Setting it true would lose updates whenever two arrive close together.
concurrency:
  group: update-formula
  cancel-in-progress: false

jobs:
  update:
    name: Update formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Verify-before-pin gate. A repository_dispatch payload is
      # attacker-settable (client_payload.* — anyone who can POST a dispatch
      # controls every field), so before mutating the formula we prove the
      # artifacts this version will pin are genuine:
      #   1. valid SLSA build provenance from the source repo's release
      #      workflow (fails closed if absent/invalid), and
      #   2. the dispatch-supplied SHA256s actually match those genuine
      #      artifacts — defeating a tampered-SHA dispatch.
      # cadence-hooks is a security-control binary in the agentic harness; a
      # bad pin would silently swap out the guardrail enforcer. Scoped to
      # cadence-hooks (the formula that publishes provenance); other formulae
      # skip this gate until they publish attestations too.
      - name: Verify release provenance (cadence-hooks)
        if: github.event.client_payload.formula == 'cadence-hooks'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.client_payload.version }}
          SHA_MACOS_X86_64: ${{ github.event.client_payload.sha_macos_x86_64 }}
          SHA_MACOS_AARCH64: ${{ github.event.client_payload.sha_macos_aarch64 }}
          SHA_LINUX_X86_64: ${{ github.event.client_payload.sha_linux_x86_64 }}
          SHA_LINUX_AARCH64: ${{ github.event.client_payload.sha_linux_aarch64 }}
        run: |
          SRC_REPO="cameronsjo/cadence-hooks"
          TAG="v${VERSION}"
          mkdir -p verify-tmp
          gh release download "$TAG" -R "$SRC_REPO" \
            --pattern 'cadence-hooks-v*.tar.gz' --dir verify-tmp

          # Each platform maps to the dispatch-supplied SHA we are about to pin.
          declare -A EXPECTED=(
            ["macos-x86_64"]="$SHA_MACOS_X86_64"
            ["macos-aarch64"]="$SHA_MACOS_AARCH64"
            ["linux-x86_64"]="$SHA_LINUX_X86_64"
            ["linux-aarch64"]="$SHA_LINUX_AARCH64"
          )
          for platform in "${!EXPECTED[@]}"; do
            file="verify-tmp/cadence-hooks-${TAG}-${platform}.tar.gz"
            if [ ! -f "$file" ]; then
              echo "::error::Release artifact missing: ${file}"
              exit 1
            fi
            # Provenance: artifact must be attested by the source repo's release
            # workflow. gh attestation verify exits non-zero (fails closed) if
            # the attestation is absent or does not validate.
            gh attestation verify "$file" -R "$SRC_REPO"
            # Pin integrity: the SHA the dispatch told us to pin must equal the
            # genuine artifact's SHA.
            actual=$(sha256sum "$file" | awk '{print $1}')
            if [ "$actual" != "${EXPECTED[$platform]}" ]; then
              echo "::error::SHA mismatch for ${platform}: dispatch=${EXPECTED[$platform]} actual=${actual}"
              exit 1
            fi
            echo "verified ${platform}: provenance OK, sha matches"
          done
          rm -rf verify-tmp

      - name: Update formula version and checksums
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
          SHA_MACOS_X86_64: ${{ github.event.client_payload.sha_macos_x86_64 }}
          SHA_MACOS_AARCH64: ${{ github.event.client_payload.sha_macos_aarch64 }}
          SHA_LINUX_X86_64: ${{ github.event.client_payload.sha_linux_x86_64 }}
          SHA_LINUX_AARCH64: ${{ github.event.client_payload.sha_linux_aarch64 }}
        run: |
          # Validate inputs: formula name must be alphanumeric+hyphens, version semver-like, shas hex
          if ! echo "$FORMULA" | grep -qE '^[a-z0-9-]+$'; then
            echo "::error::Invalid formula name"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Invalid version format"
            exit 1
          fi
          for sha in "$SHA_MACOS_X86_64" "$SHA_MACOS_AARCH64" "$SHA_LINUX_X86_64" "$SHA_LINUX_AARCH64"; do
            if ! echo "$sha" | grep -qE '^[0-9a-f]{64}$'; then
              echo "::error::Invalid SHA256 hash"
              exit 1
            fi
          done

          FORMULA_FILE="Formula/${FORMULA}.rb"
          if [ ! -f "$FORMULA_FILE" ]; then
            echo "::error::Formula not found: ${FORMULA_FILE}"
            exit 1
          fi

          OLD_VERSION=$(grep -m1 'version "' "$FORMULA_FILE" | sed 's/.*version "\(.*\)"/\1/')
          echo "Updating ${FORMULA} from ${OLD_VERSION} to ${VERSION}"

          sed -i "s/version \"${OLD_VERSION}\"/version \"${VERSION}\"/" "$FORMULA_FILE"

          # Replace SHA256 values in order (macos-intel, macos-arm, linux-intel, linux-arm)
          python3 - "$FORMULA_FILE" "$SHA_MACOS_X86_64" "$SHA_MACOS_AARCH64" "$SHA_LINUX_X86_64" "$SHA_LINUX_AARCH64" <<'PYTHON'
          import sys, re
          path, *new_shas = sys.argv[1:]
          with open(path) as f:
              content = f.read()
          matches = list(re.finditer(r'sha256 "[0-9a-f]{64}"', content))
          if len(matches) != len(new_shas):
              print(f"::error::Expected {len(new_shas)} sha256 entries, found {len(matches)}")
              sys.exit(1)
          for match, new_sha in reversed(list(zip(matches, new_shas))):
              content = content[:match.start()] + f'sha256 "{new_sha}"' + content[match.end():]
          with open(path, 'w') as f:
              f.write(content)
          print(f"Updated {len(new_shas)} checksums")
          PYTHON

      - name: Commit and push
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update ${FORMULA} to ${VERSION}"
          git push
